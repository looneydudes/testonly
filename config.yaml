mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090

dns:
  enable: true
  listen: 0.0.0.0:53
  default-nameserver:
    - 8.8.8.8
    - 1.1.1.1
  nameserver:
    - https://dns.google/dns-query
  fallback:
    - https://1.1.1.1/dns-query
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4

proxies:
  - name: "ifconfig-proxy"
    type: http
    server: 31.59.20.176
    port: 6754
  - name: "default-proxy"
    type: http
    server: 23.95.150.145
    port: 6114

proxy-groups:
  - name: "default"
    type: select
    proxies:
      - "default-proxy"
      - "ifconfig-proxy"

rules:
  # Specific rule for ifconfig.me
  - DOMAIN,ifconfig.me,ifconfig-proxy
  
  # Rule for all YouTube/Google video subdomains (e.g., rr1---sn-xxx.googlevideo.com)
  - DOMAIN-SUFFIX,googlevideo.com,default
  
  # The "catch-all" rule set to DIRECT instead of a proxy
  - MATCH,DIRECT